<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fear me Khaleda</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- start button -->
    <div class="fight-box">
      <div class="character">
        <img alt="Fight" src="hasina2.0.png" class="character-img" />
      </div>
      <div class="fight-text-box">
        <button class="fight-text"></button>
        <button class="cha-change"></button>
      </div>
    </div>

    <!-- rotate warning -->
    <div id="rotate-warning">
      <img src="rotate.webp" alt="Please rotate your device" />
    </div>

    <!-- timer -->
    <div class="timer">
      <h2 class="time">00:00</h2>
    </div>

    <!-- controler -->
    <div class="up-down">
      <button class="up-controler">
        <img alt="up-controler" src="up.webp" class="up" />
      </button>
      <button class="down-controler">
        <img alt="down-controler" src="down.webp" class="down" />
      </button>
    </div>

    <!-- Powers button -->
    <div class="power-button-container">
      <button class="main-power-button"></button>
      <button class="sub-button btn-top"></button>
      <button class="sub-button btn-bottom"></button>
      <button class="sub-button btn-left"></button>
      <button class="sub-button btn-right"></button>
    </div>

    <!-- sliding image -->
    <div class="background-box">
      <div class="background">
        <img alt="background-image" class="bgimg" src="bg.jpg" />
      </div>

      <!-- ground -->
      <div class="ground-box">
        <!-- 50 ground images -->
        <img alt="ground" class="ground" src="grass.png" />
      </div>
    </div>

    <!-- People -->
    <div class="people">
      <div class="khaleda breathing">
        <img alt="khaleda" src="khaleda.png" class="khaleda kha" />
      </div>

      <div class="hasina breathing">
        <img alt="hasina" src="hasina.png" class="hasina has" />
      </div>
    </div>
  </body>
  <script src="script.js"></script>
</html>
