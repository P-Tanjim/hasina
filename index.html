<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fear me Khaleda</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
  </head>
  <body>
    <!-- start button -->
    <div class="fight-box">
      <div class="character">
        <img alt="Fight" src="hasina2.0.webp" class="character-img" />
      </div>
      <div class="fight-text-box">
        <button class="fight-text"></button>
        <button class="cha-change"></button>
      </div>
    </div>

    <!-- rotate warning -->
    <div id="rotate-warning">
      <img src="rotate.webp" alt="Please rotate your device" />
    </div>

    <!-- health -->
    <div class="health">
      <div class="woman-one"></div>
      <div class="woman-two"></div>
      <div class="health-one"></div>
      <div class="health-two"></div>
    </div>

    <!-- timer -->
    <div class="timer">
      <h2 class="time">00:00</h2>
    </div>

    <!-- controler -->
    <div class="up-down">
      <button class="up-controler">
        <img alt="up-controler" src="up.webp" class="up" />
      </button>
      <button class="down-controler">
        <img alt="down-controler" src="down.webp" class="down" />
      </button>
    </div>

    <!-- Powers button -->
    <div class="power-button-container">
      <button class="main-power-button"></button>

      <button class="sub-button btn-top" id="dog"></button>

      <button class="sub-button btn-bottom" id="heli"></button>

      <button class="sub-button btn-left" id="police"></button>

      <button class="sub-button btn-right" id="gun"></button>
    </div>
    <div class="shield"><i class="fa-solid fa-shield"></i></div>

    <!-- dogs power -->
     <div class="dogs-box"></div>
     <div class="dogs-attack"></div>
     
     <!-- helicopter attack-->
     <div class="heli" id="heli"></div>
     
     <!-- bullet 
     <div class="bullet">
         <marquee direction="right"><img src="bullet.png" alt="bullet"></img></marquee>
     </div> - - >
     
     
    <!-- background image -->
    <div class="background-box">
      <div class="background">
        <!-- <img alt="background-image" class="bgimg" src="bg.avif" /> -->
      </div>

      <!-- ground -->
      <div class="ground-box">
        <!-- 50 ground images -->
        <!-- <img alt="ground" class="ground" src="ground.png" /> -->
         <div class="ground"></div>
      </div>
    </div>

    <!-- People -->
    <div class="people">
      <div class="khaleda breathing">
        <img alt="khaleda" src="khaleda.webp" class="khaleda kha" />
      </div>

      <div class="hasina breathing">
        <img alt="hasina" src="hasina.webp" class="hasina has" />
      </div>
    </div>
  </body>
  <script src="script.js"></script>
</html>
